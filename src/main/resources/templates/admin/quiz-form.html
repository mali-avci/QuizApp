<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin - Quiz Form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>
<main class="container">
    <h1>Quiz Form</h1>
    <form th:action="${quiz.id} != null ? @{'/admin/quizzes/' + ${quiz.id}} : @{/admin/quizzes}" method="post" th:object="${quiz}" style="max-width:520px;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <div class="form-group">
            <label>Baslik</label>
            <input type="text" th:field="*{title}" required placeholder="Quiz basligi" />
        </div>
        <div class="form-group">
            <label>Kategori</label>
            <input type="text" th:field="*{category}" required placeholder="ornegin: Matematik" />
        </div>
        <div class="form-group">
            <label>Sure (saniye)</label>
            <input type="number" th:field="*{durationSeconds}" min="30" required placeholder="300" />
        </div>
        <button class="btn" type="submit">Kaydet</button>
    </form>
</main>
</body>
</html>
