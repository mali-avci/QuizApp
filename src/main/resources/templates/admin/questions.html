<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin - Sorular</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>
<main class="container">
    <div class="header-row">
        <h1 th:text="${quiz.title} + ' — Sorular'"></h1>
        <a class="btn btn--sm" th:href="@{/admin/quizzes/{id}/questions/new(id=${quiz.id})}">+ Yeni Soru</a>
    </div>
    <div class="table-wrapper">
        <table class="table">
            <thead>
                <tr>
                    <th>Soru</th>
                    <th>Islem</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="question : ${questions}">
                    <td th:text="${question.text}"></td>
                    <td>
                        <div class="admin-actions">
                            <a class="link-btn" th:href="@{/admin/questions/{id}/edit(id=${question.id})}">Duzenle</a>
                            <form th:action="@{/admin/questions/{id}/delete(id=${question.id})}" method="post" class="inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <button type="submit" class="link-btn link-btn--danger">Sil</button>
                            </form>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
