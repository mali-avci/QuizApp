<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Giris - QuizApp</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
<div class="auth-page">
    <div class="auth">
        <div class="auth-logo">QuizApp</div>
        <h1>Tekrar Hosgeldin</h1>
        <span class="subtitle">Hesabina giris yap ve quizlere katil.</span>

        <p th:if="${param.error}" class="error">Hatali kullanici adi veya sifre.</p>
        <p th:if="${param.registered}" class="success">Kayit basarili. Giris yapabilirsiniz.</p>

        <form method="post" th:action="@{/login}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <div class="form-group">
                <label for="username">Kullanici Adi</label>
                <input type="text" id="username" name="username" required placeholder="kullanici_adin" />
            </div>
            <div class="form-group">
                <label for="password">Sifre</label>
                <input type="password" id="password" name="password" required placeholder="••••••••" />
            </div>
            <button type="submit" class="btn" style="width:100%;justify-content:center;">Giris Yap</button>
        </form>

        <p class="auth-footer">Hesabin yok mu? <a th:href="@{/register}">Kayit Ol</a></p>
    </div>
</div>
</body>
</html>
