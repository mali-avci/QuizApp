<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Quizler</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>
<main class="container">
    <h1>Quizler</h1>
    <div class="cards">
        <div class="card" th:each="quiz : ${quizzes}">
            <h2 th:text="${quiz.title}"></h2>
            <p>Kategori: <span th:text="${quiz.category}"></span></p>
            <p>Sure: <span th:text="${quiz.durationSeconds}"></span> sn</p>
            <a class="btn" th:href="@{/quizzes/{id}(id=${quiz.id})}">Basla</a>
        </div>
    </div>
</main>
</body>
</html>
