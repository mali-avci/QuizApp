<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quizler - QuizApp</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>
<main class="container">
    <h1>Quizler</h1>
    <div class="cards">
        <div class="card" th:each="quiz : ${quizzes}">
            <h2 th:text="${quiz.title}"></h2>
            <div class="card-meta">
                <span class="pill pill--accent" th:text="${quiz.category}"></span>
                <span class="pill" th:text="${quiz.durationSeconds} + ' sn'"></span>
            </div>
            <a class="btn btn--sm" th:href="@{/quizzes/{id}(id=${quiz.id})}">Basla</a>
        </div>
    </div>
</main>
</body>
</html>
