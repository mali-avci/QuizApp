<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sonuc - QuizApp</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>
<main class="container">

    <div class="score-card">
        <div class="score-card__label">Tamamlandi</div>
        <div class="score-card__quiz" th:text="${attempt.quiz.title}"></div>
        <div class="score-card__score" th:text="${attempt.score}"></div>
        <div class="score-card__total" th:text="'/ ' + ${attempt.total} + ' soru'"></div>
    </div>

    <div class="chart-section">
        <h2>Ozet</h2>
        <div class="chart">
            <div class="chart__row">
                <span>Dogru</span>
                <div class="bar-track">
                    <div class="bar bar--good" th:style="'width:' + ${correctPercent} + '%'">
                        <span th:text="${correctCount}"></span>
                    </div>
                </div>
                <span th:text="${correctPercent} + '%'"></span>
            </div>
            <div class="chart__row">
                <span>Yanlis</span>
                <div class="bar-track">
                    <div class="bar bar--bad" th:style="'width:' + ${wrongPercent} + '%'">
                        <span th:text="${wrongCount}"></span>
                    </div>
                </div>
                <span th:text="${wrongPercent} + '%'"></span>
            </div>
        </div>
    </div>

    <h2>Detayli Sonuclar</h2>
    <div class="table-wrapper">
        <table class="table result-table">
            <thead>
                <tr>
                    <th>Soru</th>
                    <th>Senin Cevabin</th>
                    <th>Dogru Cevap</th>
                    <th>Durum</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="review : ${reviews}">
                    <td th:text="${review.questionText}"></td>
                    <td th:text="${review.selectedText}"></td>
                    <td th:text="${review.correctText}"></td>
                    <td>
                        <span class="badge"
                              th:classappend="${review.correct} ? 'badge--good' : 'badge--bad'"
                              th:text="${review.correct} ? 'Dogru' : 'Yanlis'"></span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <a class="btn" th:href="@{/quizzes}">Diger Quizler</a>
</main>
</body>
</html>
